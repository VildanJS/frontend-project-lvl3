env:
  node: true
  browser: true
  jest/globals: true

extends:
  - 'airbnb-base'

plugins:
  - 'jest'

parserOptions:
  ecmaVersion: latest

rules:
  no-console: 0
  import/extensions:
    - error
    - ignorePackages
    - js: always
  no-underscore-dangle: [2, { "allow": ["__filename", "__dirname"] }]
